<div class="form-floating has-validation">
  <input
    type="password"
    class="@{props.class}"
    @{if props.id === 'newPassword'}
      autocomplete="new-password"
    @{else}
      autocomplete="current-password"
    @{endif}
    id="@{props.id}"
    name="@{props.name}"
    minlength="8"
    maxlength="40"
    required
  />
  <label for="@{props.id}" class="fst-italic">@{props.label}</label>
  <div class="invalid-feedback fst-italic">@{props.errorMessage}</div>
</div>
