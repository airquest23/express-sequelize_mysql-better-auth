<!-- SIDEBAR -->
<div
  class="sidebar p-0 bg-body-tertiary border show"
  id="sidebar"
>
  <!-- MENU -->
  <div
    class="offcanvas-md offcanvas-end d-md-flex flex-column bg-body-tertiary h-100"
    id="sidebarMenu"
    aria-labelledby="sidebarMenuLabel"
    tabindex="-1"
  >
    <!-- MENU HEADER -->
    <div
      class="offcanvas-header"
      id="sidebarMenuHeader"
    >      
      <!-- CLOSE BUTTON -->
      <button
        type="button"
        class="btn-close"
        data-bs-dismiss="offcanvas"
        data-bs-target="#sidebarMenu"
        aria-label="Close"
      ></button>
      <!-- END CLOSE BUTTON -->
    </div>
    <!-- END MENU HEADER -->
    
    <!-- SEPARATOR -->
    <hr class="my-3 mobile-only"/>
    <!-- END SEPARATOR -->
    
    <!-- MENU BODY -->
    <div
      class="offcanvas-body d-md-flex flex-column p-0 overflow-y-auto"
      id="sidebarMenuBody"
    >
      <!-- MAIN MENU -->
      <ul class="nav flex-column">

        <li class="nav-item mt-3">
          <a
            @{if* props.currentPage === 'home'}
              class="nav-link d-flex align-items-center gap-2 active"
              aria-current="page"
            @{else*}
              class="nav-link d-flex align-items-center gap-2"
            @{endif*}
            href="/"
          >
            <svg class="bi" aria-hidden="true">
              <use xlink:href="#house-fill"></use>
            </svg>
            @(#dashboard)
          </a>
        </li>

        <li class="nav-item">
          <a
            @{if* props.currentPage === 'texts'}
              class="nav-link d-flex align-items-center gap-2 active"
              aria-current="page"
            @{else*}
              class="nav-link d-flex align-items-center gap-2"
            @{endif*}
            href="/texts"
          >
            <svg class="bi" aria-hidden="true">
              <use xlink:href="#file-text"></use>
            </svg>
            @(#texts)
          </a>
        </li>

        <li class="nav-item">
          <a
            @{if* props.currentPage === 'rich_texts'}
              class="nav-link d-flex align-items-center gap-2 active"
              aria-current="page"
            @{else*}
              class="nav-link d-flex align-items-center gap-2"
            @{endif*}
            href="/rich-texts"
          >
            <svg class="bi" aria-hidden="true">
              <use xlink:href="#file-text"></use>
            </svg>
            @(#richTexts)
          </a>
        </li>
      </ul>
      <!-- END MAIN MENU -->

      <!-- SEPARATOR -->
      <hr class="my-3"/>
      <!-- END SEPARATOR -->
      
      <!-- SETTINGS MENU -->
      <ul class="nav flex-column">
        <li class="nav-item">
          <a
            @{if* props.currentPage === 'settings'}
              class="nav-link d-flex align-items-center gap-2 active"
              aria-current="page"
            @{else*}
              class="nav-link d-flex align-items-center gap-2"
            @{endif*}
            href="/user"
          >
            <svg class="bi" aria-hidden="true">
              <use xlink:href="#gear-wide-connected"></use>
            </svg>
            @(#settings)
          </a>
        </li>

        <li class="nav-item">
          <a
            class="nav-link d-flex align-items-center gap-2"
            href="/signout"
          >
            <svg class="bi" aria-hidden="true">
              <use xlink:href="#door-closed"></use>
            </svg>
            @(#signOut)
          </a>
        </li>
      </ul>
      <!-- END SETTINGS MENU -->
      
      @{if model.isAdmin}
        <!-- SEPARATOR -->
        <hr class="my-3"/>
        <!-- END SEPARATOR -->
        
        <!-- ADMIN MENU -->
        <ul class="nav flex-column">
          <li class="nav-item">
            <a
              @{if* props.currentPage === 'admin'}
                class="nav-link d-flex align-items-center gap-2 active"
                aria-current="page"
              @{else*}
                class="nav-link d-flex align-items-center gap-2"
              @{endif*}
              href="/admin"
            >
              <i class="bi bi-incognito"></i>
              @(#admin)
            </a>
          </li>
        </ul>
        <!-- END SETTINGS MENU -->
      @{endif}
    </div>
    <!-- END MENU BODY -->
    
    <!-- SEPARATOR -->
    <hr class="my-3"/>
    <!-- END SEPARATOR -->
    
    <!-- MENU FOOTER -->
    <div
      class="offcanvas-footer"
      id="sidebarMenuFooter"
    >
      <div class="text-center">
        <a
          href="/contact-us"
          class="link-secondary link-offset-2 link-underline-opacity-25 link-underline-opacity-100-hover fst-italic"
        >
          @(#contactUs)
        </a>
      </div>

      <!-- SEPARATOR -->
      <hr class="my-3"/>
      <!-- END SEPARATOR -->
      
      <div class="text-center mb-3">
        <a href="/?language=en" id="langLinkEn"><span class="badge text-bg-secondary">en</span></a>
        <a href="/?language=fr" id="langLinkFr"><span class="badge text-bg-secondary">fr</span></a>
      </div>

      <script>
        window.addEventListener('DOMContentLoaded', function() {
          try {
            const linkFr = document.getElementById('langLinkFr');
            const linkEn = document.getElementById('langLinkEn');
            if (!linkFr || !linkEn) {
              console.error("Link element not found.");
              return;
            };
            linkFr.setAttribute('href', window.location.pathname + '?language=fr');
            linkEn.setAttribute('href', window.location.pathname + '?language=en');
          } catch (error) {
            console.error("Error setting href:", error);
          };
        });
      </script>
    </div>
    <!-- END MENU FOOTER -->
  </div>
  <!-- END MENU -->
</div>
<!-- END SIDEBAR -->
