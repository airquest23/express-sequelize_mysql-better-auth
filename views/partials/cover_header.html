<header class="mb-auto">
  <div>
    <h3 class="float-md-start mb-0">@(#appName)</h3>
    <nav class="nav nav-masthead justify-content-center float-md-end">
      <a
        @{if props.currentPage === 'home'}
          class="nav-link fw-bold py-1 px-0 active"
          aria-current="page"
        @{else}
          class="nav-link fw-bold py-1 px-0"
        @{endif}
        href="/"
      >
        @(#home)
      </a>
      
      @{if_nocache !model.isLoggedIn}
        <a
          @{if props.currentPage === 'login'}
            class="nav-link fw-bold py-1 px-0 active"
            aria-current="page"
          @{else}
            class="nav-link fw-bold py-1 px-0"
          @{endif}
          href="/login"
        >
          @(#login)
        </a>
      @{endif_nocache}
      
      @{if_nocache !model.isLoggedIn}
        <a
          @{if props.currentPage === 'signup'}
            class="nav-link fw-bold py-1 px-0 active"
            aria-current="page"
          @{else}
            class="nav-link fw-bold py-1 px-0"
          @{endif}
          href="/signup"
        >
          @(#signUp)
        </a>
      @{endif_nocache}
      
      @{if_nocache model.isLoggedIn}
        <a
          class="nav-link fw-bold py-1 px-0"
          href="/signout"
        >
          @(#signOut)
        </a>
      @{endif_nocache}
    </nav>
  </div>
</header>
