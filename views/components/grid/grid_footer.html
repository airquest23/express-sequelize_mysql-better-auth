<div class="d-flex align-items-center justify-content-between mb-3 mobilePaginationContainer">
  <!-- PAGINATION INFOS & CHANGE LIMIT -->
  <div class="d-flex flex-column mobilePaginationInfo">
    <!-- PAGINATION INFOS -->
    <div class="mobilePaginationRowsInfo">
      <div>
        <span>@(#objects) </span>
        <i id="firstShowingLine">1</i>
        <span> @(#to) </span>
        <i id="lastShowingLine">@{model.lastLine}</i>
        <span> @(#of) </span>
        <b id="totalLines">@{model.count}</b>
      </div>
    </div>

    <!-- CHANGE PAGES LIMIT -->
    <div class="mt-2 mobilePaginationLimitInfo">
      <!-- CHANGE PAGES LIMIT INPUT -->
      <span>(@(#max). </span>
      <input
        type="number"
        class="limitInput"
        placeholder="100"
        value="@{model.limit}"
        id="limitPerPage"
      >

      <!-- CLEAR PAGES LIMIT BUTTON -->
      <button
        type="button"
        class="btn btn-sm mb-1"
        aria-label="@(#resetPagination)"
        id="resetPagination"
      ><i class="bi bi-x-octagon"></i></button>
      <span>@(#objectsNoCap) / @(#pageNoCap))</span>
    </div>
  </div>
  
  <!--PAGINATION & CHANGE LISTVIEW COLS-->
  <div class="d-flex flex-column">
    <!-- PAGINATION -->
    <ul
      class="pagination m-0"
      id="pagination"
    ></ul>

    <!-- CHANGE LISTVIEW COLS -->
    <div
      class="mt-4 d-none"
      id="nrOfColsContainer"
    >
      <!-- CHANGE LISTVIEW COLS INPUT -->
      <span class="me-2">
        <i class="bi bi-grid-3x2-gap-fill"></i>
        <span class="ms-1"> -&gt; </span>
        <i class="bi bi-grid-3x3-gap-fill"></i>
        <span> : </span>
      </span>
      <input
        type="number"
        class="limitInput"
        placeholder="3"
        value="3"
        id="nrOfCols"
      >

      <!-- CLEAR LISTVIEW COLS BUTTON -->
      <button
        type="button"
        class="btn btn-sm mb-1"
        aria-label="@(#resetCols)"
        id="resetCols"
      ><i class="bi bi-x-octagon"></i></button>
    </div>
  </div>
</div>
