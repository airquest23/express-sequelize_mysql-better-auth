<main class="px-3">
  <style>
    .block404 {
      position: relative;
      background-image: url(https://imgur.com/eHVyWTM.jpg);
      width: 100%;
      height: 400px;
      overflow: hidden;
      cursor: pointer;
    }
    .waves {
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: url(https://imgur.com/eHVyWTM.jpg);
      filter: url("#glitch");
    }
    .obj {
      width: 204px;
      height: 209px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: animation-404 6s infinite ease-in-out;
    }
    @keyframes animation-404 {
      0%,
      100% {
        transform: translate(-50%, -50%) rotate(0);
      }
      50% {
        transform: translate(-53%, -42%) rotate(-5deg);
      }
    }
    .t404 {
      position: absolute;
      width: 364px;
      height: 146px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-image: url(https://imgur.com/KPZo9YX.png);
    }
  </style>
  <div class="block404">
    <div class="waves"></div>
    <div class="obj">
      <img src="https://imgur.com/w0Yb4MX.png" alt="">
    </div>
    <div class="t404"></div>
  </div>
</main>
